<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Guru</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#74b9ff,#a29bfe);
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4834d4;
}

</style>
</head>

<body>

<div class="container">

<h2>👨‍🏫 Login Guru</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
