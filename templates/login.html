<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<title>Login Admin SMANCIO</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6c5ce7,#74b9ff);
}

.card{
background:white;
padding:35px;
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#574bcb;
}

.back{
margin-top:15px;
font-size:13px;
}

.back a{
text-decoration:none;
color:#00b894;
font-weight:bold;
}

.back a:hover{
text-decoration:underline;
}

</style></head><body><div class="card"><h2>🔐 Login Admin</h2><form action="/login" method="POST"><input type="text" name="username" placeholder="Username Admin" required><input type="password" name="password" placeholder="Password" required><button type="submit">Login</button>

</form><div class="back">
<a href="/">⬅ Kembali ke Halaman Absensi</a>
</div></div></body>
</html>
