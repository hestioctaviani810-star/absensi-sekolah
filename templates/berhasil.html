<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Berhasil Absen</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#dff9fb;
    font-family:Arial, Helvetica, sans-serif;
}
.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}
button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00b894;
    color:white;
    cursor:pointer;
    font-size:14px;
}
button:hover{background:#019875;}
</style>
</head>
<body>
<div class="card">
<h2>✅ Absensi {{ nama }} Berhasil!</h2>
<a href="/"><button>⬅ Kembali</button></a>
</div>
</body>
</html>
