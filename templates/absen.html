<!DOCTYPE html>
<html>
<head>
<title>Absensi Siswa</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00c6ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
margin-top:0;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#4facfe;
border:none;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2d8cf0;
}

button:active{
transform:scale(0.97);
}

.notif{
background:#2ecc71;
color:white;
padding:10px;
border-radius:6px;
margin-bottom:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h2>📋 Absensi Siswa</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="notif">
✅ {{ messages[0] }}
</div>

<audio autoplay>
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(function(){
window.location.href="/absen";
},2000);
</script>

{% endif %}
{% endwith %}

<form method="POST" onsubmit="return loading()">

<input type="text" name="nama" placeholder="Nama siswa" required>

<select name="kelas" required>
<option value="">Pilih Kelas</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<select name="status" required>
<option>Hadir</option>
<option>Izin</option>
<option>Sakit</option>
<option>Alpha</option>
</select>

<button type="submit" id="btn">📌 Absen Sekarang</button>

</form>

</div>

<script>

function loading(){
document.getElementById("btn").innerHTML="⏳ Mengirim...";
document.getElementById("btn").disabled=true;
return true;
}

</script>

</body>
</html>
