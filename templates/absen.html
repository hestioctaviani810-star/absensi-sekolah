<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi Siswa</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4e73df,#36b9cc);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#4e73df;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:10px;
background:#4e73df;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2e59d9;
transform:scale(1.05);
}

.success{
background:#2ecc71;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
animation:muncul 0.4s ease;
}

@keyframes muncul{
from{
opacity:0;
transform:translateY(-10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="container">

<h2>📋 Absensi Siswa</h2>

<!-- NOTIFIKASI -->
{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="success">
✅ {{ messages[0] }}
</div>

<audio id="notif">
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<script>
document.getElementById("notif").play();
</script>

{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="nama" placeholder="Nama Siswa" required>

<select name="kelas" required>
<option value="">Pilih Kelas</option>
<option>10</option>
<option>11</option>
<option>12</option>
</select>

<select name="status" required>
<option value="">Status Kehadiran</option>
<option>Hadir</option>
<option>Izin</option>
<option>Sakit</option>
<option>Alpha</option>
</select>

<button type="submit">📌 Absen Sekarang</button>

</form>

</div>

</body>
</html>
