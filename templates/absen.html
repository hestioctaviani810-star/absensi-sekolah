<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Absensi Siswa</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00c6ff);
}

.card{
background:white;
padding:35px;
width:350px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4facfe;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2d8cf0;
}

button:active{
transform:scale(0.97);
}

.notif{
background:#2ecc71;
color:white;
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-size:14px;
}

.login-link{
margin-top:15px;
font-size:13px;
}

.login-link a{
color:#2d8cf0;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<h2>📋 Absensi Siswa</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}

<div class="notif">
✅ {{ messages[0] }}
</div>

<audio autoplay>
<source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
</audio>

<script>
setTimeout(function(){
window.location.href="/absen";
},2000);
</script>

{% endif %}
{% endwith %}

<form method="POST" onsubmit="return loading()">

<input type="text" name="nama" placeholder="Nama siswa" required>

<select name="kelas" required>
<option value="">Pilih Kelas</option>
<option value="10">Kelas 10</option>
<option value="11">Kelas 11</option>
<option value="12">Kelas 12</option>
</select>

<select name="status" required>
<option value="Hadir">Hadir</option>
<option value="Izin">Izin</option>
<option value="Sakit">Sakit</option>
<option value="Alpha">Alpha</option>
</select>

<button type="submit" id="btn">📌 Absen Sekarang</button>

</form>

<div class="login-link">
Guru? <a href="/login">Login di sini</a>
</div>

</div>

<script>

function loading(){
document.getElementById("btn").innerHTML="⏳ Mengirim...";
document.getElementById("btn").disabled=true;
return true;
}

</script>

</body>
</html>
