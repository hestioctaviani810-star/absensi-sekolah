<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Data Absensi Siswa</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fa;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

h2{
text-align:center;
color:#2c3e50;
margin-bottom:20px;
}

/* tombol */

button{
padding:8px 16px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.export{
background:#3498db;
color:white;
}

.logout{
background:#ff6b6b;
color:white;
}

.hapus{
background:#ff4d4d;
color:white;
}

button:hover{
transform:scale(1.05);
}

/* statistik */

.stats{
display:flex;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.stat{
flex:1;
padding:20px;
border-radius:10px;
color:white;
text-align:center;
font-weight:bold;
}

.hadir{background:#2ecc71;}
.izin{background:#f39c12;}
.sakit{background:#3498db;}
.alpha{background:#e74c3c;}

/* tabel */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#5dade2;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f2f6ff;
}

.status-hadir{color:#2ecc71;font-weight:bold;}
.status-izin{color:#f39c12;font-weight:bold;}
.status-sakit{color:#3498db;font-weight:bold;}
.status-alpha{color:#e74c3c;font-weight:bold;}

.aksi{
text-align:center;
}

.aksi a{
display:flex;
justify-content:center;
}

.top{
text-align:center;
margin-bottom:15px;
}

.filter{
text-align:center;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>📊 Data Absensi Siswa SMAN 1 Ciomas</h2>

<div class="top">
<a href="/export"><button class="export">📥 Export Excel</button></a>
<a href="/logout"><button class="logout">🚪 Logout</button></a>
</div>

<!-- statistik -->
<div class="stats">

<div class="stat hadir">
Hadir<br>
{{ hadir }}
</div>

<div class="stat izin">
Izin<br>
{{ izin }}
</div>

<div class="stat sakit">
Sakit<br>
{{ sakit }}
</div>

<div class="stat alpha">
Alpha<br>
{{ alpha }}
</div>

</div>

<!-- filter -->

<form method="GET" class="filter">
Filter Status:
<select name="status" onchange="this.form.submit()">
<option value="semua">Semua</option>
<option value="Hadir">Hadir</option>
<option value="Izin">Izin</option>
<option value="Sakit">Sakit</option>
<option value="Alpha">Alpha</option>
</select>
</form>

<table>

<tr>
<th>Nama</th>
<th>Kelas</th>
<th>Status</th>
<th>Tanggal</th>
<th>Aksi</th>
</tr>

{% for siswa in data %}
<tr>

<td>{{ siswa.nama }}</td>

<td>{{ siswa.kelas }}</td>

<td class="status-{{ siswa.status|lower }}">
{{ siswa.status }}
</td>

<td>{{ siswa.tanggal.strftime("%d-%m-%Y") }}</td>

<td class="aksi">
<a href="/hapus/{{ siswa.id }}">
<button class="hapus">🗑 Hapus</button>
</a>
</td>

</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
