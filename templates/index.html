<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Guru</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin:0;
    padding:0;
}
.container {
    width: 90%;
    max-width: 1000px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
h2 {
    text-align: center;
    color: #4e73df;
    margin-bottom: 25px;
}
button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 14px;
}
button.export {
    background-color: #4e73df;
    color: white;
    margin-right: 10px;
}
button.export:hover {
    background-color: #2e59d9;
    transform: scale(1.05);
}
button.logout {
    background-color: #ff6b6b;
    color: white;
}
button.logout:hover {
    background-color: #e63946;
    transform: scale(1.05);
}
button.hapus {
    background-color: #ff4757;
    color: white;
}
button.hapus:hover {
    background-color: #e84118;
    transform: scale(1.05);
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 14px;
}
th, td {
    padding: 10px;
    text-align: center;
}
th {
    background-color: #4e73df;
    color: white;
}
tr:nth-child(even) {
    background-color: #f2f2f2;
}
.status-hadir { color: green; font-weight: bold; }
.status-izin { color: orange; font-weight: bold; }
.status-sakit { color: blue; font-weight: bold; }
.status-alpha { color: red; font-weight: bold; }
.filter {
    margin-bottom: 15px;
    text-align: center;
}
@media(max-width:600px){
    table, th, td {
        font-size: 12px;
    }
    button {
        font-size: 12px;
        padding: 6px 12px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h2>📊 Dashboard Guru</h2>

    <!-- tombol export & logout -->
    <div style="margin-bottom:15px; text-align:center;">
        <a href="/export"><button class="export">📥 Export Excel</button></a>
        <a href="/logout"><button class="logout">🚪 Logout</button></a>
    </div>

    <!-- filter status -->
    <form method="GET" class="filter">
        <label>Filter Status:</label>
        <select name="status" onchange="this.form.submit()">
            <option value="semua" {% if status_filter=='semua' %}selected{% endif %}>Semua</option>
            <option value="Hadir" {% if status_filter=='Hadir' %}selected{% endif %}>Hadir</option>
            <option value="Izin" {% if status_filter=='Izin' %}selected{% endif %}>Izin</option>
            <option value="Sakit" {% if status_filter=='Sakit' %}selected{% endif %}>Sakit</option>
            <option value="Alpha" {% if status_filter=='Alpha' %}selected{% endif %}>Alpha</option>
        </select>
    </form>

    <!-- tabel absensi -->
    <table>
        <tr>
            <th>Nama</th>
            <th>Kelas</th>
            <th>Status</th>
            <th>Tanggal</th>
            <th>Aksi</th>
        </tr>
        {% for siswa in data %}
        <tr>
            <td>{{ siswa.nama }}</td>
            <td>{{ siswa.kelas }}</td>
            <td class="status-{{ siswa.status|lower }}">{{ siswa.status }}</td>
            <td>{{ siswa.tanggal.strftime("%d-%m-%Y") }}</td>
            <td>
                <a href="/hapus/{{ siswa.id }}">
                    <button class="hapus">🗑 Hapus</button>
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
